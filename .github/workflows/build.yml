name: Build React App

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build the app
        run: npm run build

  stub-failed-job:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'with-failed')
    steps:
      - name: Deliberate failure
        run: |
          echo "This job intentionally fails because the 'with-failed' label is present."
          exit 1
